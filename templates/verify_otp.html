{% extends 'base.html' %}

{% block title %}Verify OTP | bidXchanger{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="margin-bottom: 1rem; font-size: 2rem; text-align: center;">Two-Factor Authentication</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
        An OTP has been sent to your registered email address. Please enter it below.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="otp">6-Digit Verification Code</label>
            <input type="text" id="otp" name="otp" pattern="\d{6}" title="Please enter a valid 6-digit OTP code." required autofocus>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Verify & Login</button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center;">
        <a href="{% url 'login' %}">Back to Login</a>
    </p>
</div>
{% endblock %}
